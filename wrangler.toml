name = "renovaihub"
main = ".open-next/worker.js"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run cf:build"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_NAME = "RenovAIHub"
ESTIMATOR_BASE_RATE_PER_SQFT = "115"
ESTIMATOR_MIN_AREA = "100"
ESTIMATOR_MIN_BUDGET = "5000"
ESTIMATOR_RUSH_MONTH_THRESHOLD = "4"
ESTIMATOR_RUSH_PREMIUM = "1.18"
ESTIMATOR_LOW_RANGE_FACTOR = "0.88"
ESTIMATOR_HIGH_RANGE_FACTOR = "1.16"
RESEND_API_KEY = "re_gMne1Udp_74ENzv8zFsAe2VaY86sKMHfB"

[observability.logs]
enabled = true
head_sampling_rate = 1

[observability.traces]
enabled = false
head_sampling_rate = 1
